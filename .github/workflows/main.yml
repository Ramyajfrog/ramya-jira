name: JFrog Frogbot Security Scan

on:
  push:
    branches:
      - main  # Triggers full repo scan on direct commits or merges to main
  pull_request:
    types: [opened, synchronize, reopened] # Triggers incremental scan on PRs

jobs:
  frogbot-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          # If it's a PR, checkout the specific PR commit, otherwise checkout the branch head
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download Frogbot Binary
        run: |
          FROGBOT_VERSION="3.2.1"
          curl -fLgsS "https://releases.jfrog.io/artifactory/frogbot/v3/${FROGBOT_VERSION}/getFrogbot.sh" | sh
          echo "Frogbot downloaded successfully!"

      # WORKFLOW 1: Executes ONLY on Pull Requests
      - name: Run Incremental Pull Request Scan
        if: github.event_name == 'pull_request'
        env:
          JF_URL: ${{ secrets.JFROG_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_DEVSECOPS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.FROGBOT_CICD_TOKEN }}
          JF_GIT_PROVIDER: "github"
          JF_GIT_OWNER: ${{ github.repository_owner }}
          JF_GIT_REPO: ${{ github.event.repository.name }}
          JF_GIT_BASE_BRANCH: ${{ github.base_ref }}
          JF_GIT_PULL_REQUEST_ID: ${{ github.event.number }}
          JFROG_CLI_LOG_LEVEL: "INFO"
        run: ./frogbot scan-pull-request

      # WORKFLOW 2: Executes ONLY on Pushes/Merges to the Default Branch
      - name: Run Full Repository Baseline Scan
        if: github.event_name == 'push'
        env:
          JF_URL: ${{ secrets.JFROG_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_DEVSECOPS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.FROGBOT_CICD_TOKEN }}
          JF_GIT_PROVIDER: "github"
          JF_GIT_OWNER: ${{ github.repository_owner }}
          JF_GIT_REPO: ${{ github.event.repository.name }}
          JF_GIT_BASE_BRANCH: ${{ github.ref_name }}
          JFROG_CLI_LOG_LEVEL: "INFO"
        run: ./frogbot scan-repository
